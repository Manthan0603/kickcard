{% extends 'base.html' %}
{% load static %}
{% block content %}
<link rel="stylesheet" href="//code.jquery.com/ui/1.12.1/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>

<style>
    .w3l-add-card-form {
        background: url('/static/images/new.jpg') no-repeat center center fixed;
        background-size: cover;
        padding: 60px 0;
        position: relative;
    }
    .w3l-add-card-form::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        z-index: 0;
    }
    .form-box {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 50px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        position: relative;
        z-index: 1;
    }
    .form-title-main {
        font-size: 2.5rem;
        font-weight: 800;
        color: #222;
        text-align: center;
        margin-bottom: 40px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .form-title-main:after {
        content: '';
        display: block;
        width: 80px;
        height: 5px;
        background: #00d2ff;
        margin: 15px auto;
        border-radius: 5px;
    }
    .form-group label {
        font-weight: 700;
        color: #444;
        margin-bottom: 8px;
        font-size: 0.9rem;
        display: block;
    }
    .form-control {
        border-radius: 10px !important;
        padding: 12px 15px !important;
        border: 2px solid #e1e1e1 !important;
        transition: 0.3s;
        font-size: 0.95rem;
    }
    .form-control:focus {
        border-color: #00d2ff !important;
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.15) !important;
        background: #fff;
    }
    textarea.form-control {
        min-height: 120px;
    }
    .btn-submit-group {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 40px;
    }
    .btn-custom {
        padding: 12px 40px;
        border-radius: 50px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s;
    }
    .btn-reset {
        background: #f8f9fa;
        color: #333;
        border: 2px solid #ddd;
    }
    .btn-reset:hover {
        background: #eee;
        transform: translateY(-2px);
    }
    /* Hide Footer */
    .w3l-footer-29-main {
        display: none !important;
    }
</style>

<section class="w3l-contact-breadcrum">
    <div class="breadcrum-bg">
        <div class="container py-5">
            <p><a href="{% url 'index' %}">Home</a> &nbsp; / &nbsp; Registration</p>
            <h2 class="my-3">Add Kick Card</h2>
        </div>
    </div>
</section>

<section class="w3l-add-card-form">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-11">
                <div class="form-box">
                    <h1 class="form-title-main">Member Registration</h1>
                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row">
                            {% for field in form %}
                            <div class="{% if field.name == 'Address' %}col-md-12{% else %}col-md-6{% endif %} mb-4">
                                <div class="form-group">
                                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                                    {{ field }}
                                    {% if field.errors %}
                                        <div class="text-danger small mt-1">
                                            {{ field.errors|striptags }}
                                        </div>
                                    {% endif %}
                                </div>
                            </div>
                            {% endfor %}
                        </div>

                        <div class="btn-submit-group">
                            <button type="submit" class="btn btn-secondary btn-theme2 btn-custom">Submit Application</button>
                            <button type="reset" class="btn btn-reset btn-custom">Clear Form</button>
                            <a href="{% url 'index' %}" class="btn btn-danger btn-custom" style="background: #ff4d4d; border: none;">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<script>
    $(document).ready(function() {
        // Add form-control class to all inputs
        $('input, select, textarea').addClass('form-control');
        
        // Initialize datepickers
        $( "#id_IssuedCardDate, #id_BirthDate" ).datepicker({
            dateFormat: 'yy-mm-dd',
            changeMonth: true,
            changeYear: true,
            yearRange: "-100:+0"
        });
    });
</script>
{% endblock %}
